<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      if (!window.__TAURI_INTERNALS__) {
        var s = document.createElement('script');
        s.src = '/tauri-mock.js';
        document.head.appendChild(s);
      }
    </script>
    <link rel="preload" href="/vite.svg" as="image" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BonNext</title>
    <style>
      /* Critical: never show white screen. CSS modules load async. */
      html, body, #root {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #0D0D0D; color: #FFF;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      /* 纯 CSS 加载指示器：在 React 加载前立即显示，React mount 后自动替换。 */
      #app-boot-loader {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #0D0D0D; z-index: 99999;
      }
      #app-boot-loader .boot-text {
        font-size: 14px; letter-spacing: 0.3em;
        color: #FFE600; font-weight: 300;
        text-transform: uppercase;
        animation: boot-pulse 1.2s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <script>
      // Prevent theme flash — apply theme class before React hydrates
      (function() {
        try {
          var theme = localStorage.getItem('bonnext:theme') || 'dark';
          document.documentElement.className = 'theme-' + theme;
        } catch(e) {}
      })();
    </script>
    <div id="root">
      <div id="app-boot-loader"><div class="boot-text">BONNEXT</div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
