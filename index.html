<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      if (!window.__TAURI_INTERNALS__) {
        var s = document.createElement('script');
        s.src = '/tauri-mock.js';
        document.head.appendChild(s);
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="/vite.svg" as="image" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BonNext</title>
    <style>
      /* Critical: never show white screen. CSS modules load async. */
      html, body, #root {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #0D0D0D; color: #FFF;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <script>
      // Prevent theme flash — apply theme class before React hydrates
      (function() {
        try {
          var theme = localStorage.getItem('bonnext:theme') || 'dark';
          document.documentElement.className = 'theme-' + theme;
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
