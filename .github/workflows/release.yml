name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # =========================================================================
  # Prepare: calculate next 1.0.N version number
  # =========================================================================
  prepare:
    name: Prepare
    if: "!contains(github.event.head_commit.message, 'chore: bump version to')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.NEW_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: calc
        name: Calculate next version
        run: |
          LATEST=$(git tag -l 'v1.0.[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LATEST" | sed 's/v1\.0\.//')
            PATCH=$((PATCH + 1))
          fi
          echo "NEW_VERSION=1.0.$PATCH" >> $GITHUB_OUTPUT
          echo "Next version: 1.0.$PATCH"

  # =========================================================================
  # Build macOS (Universal: Intel + Apple Silicon)
  # =========================================================================
  build-macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version ${{ needs.prepare.outputs.version }}
        run: |
          V="${{ needs.prepare.outputs.version }}"
          jq ".version = \"$V\"" package.json > tmp && mv tmp package.json
          jq ".version = \"$V\"" src-tauri/tauri.conf.json > tmp && mv tmp src-tauri/tauri.conf.json
          sed -i '' "s/^version = .*/version = \"$V\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '10' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (macOS Universal)
        run: pnpm tauri build --target universal-apple-darwin

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload macOS updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-macos-updater
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

  # =========================================================================
  # Build Windows
  # =========================================================================
  build-windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version ${{ needs.prepare.outputs.version }}
        shell: powershell
        run: |
          $v = "${{ needs.prepare.outputs.version }}"
          (Get-Content package.json) -replace '"version": ".*"', """version"": ""$v""" | Set-Content package.json
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": ".*"', """version"": ""$v""" | Set-Content src-tauri/tauri.conf.json
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = ""$v""" | Set-Content src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '10' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        run: pnpm tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload Windows updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-windows-updater
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: warn

  # =========================================================================
  # Build Linux (AppImage + deb)
  # =========================================================================
  build-linux:
    name: Build Linux (glibc-compat via Ubuntu 22.04)
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version ${{ needs.prepare.outputs.version }}
        run: |
          V="${{ needs.prepare.outputs.version }}"
          jq ".version = \"$V\"" package.json > tmp && mv tmp package.json
          jq ".version = \"$V\"" src-tauri/tauri.conf.json > tmp && mv tmp src-tauri/tauri.conf.json
          sed -i "s/^version = .*/version = \"$V\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '10' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Linux)
        run: pnpm tauri build

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-linux-appimage
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
          if-no-files-found: warn

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  # =========================================================================
  # Create GitHub Release with all artifacts
  # =========================================================================
  release:
    name: Create Release
    needs: [prepare, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version ${{ needs.prepare.outputs.version }}
        run: |
          V="${{ needs.prepare.outputs.version }}"
          jq ".version = \"$V\"" package.json > tmp && mv tmp package.json
          jq ".version = \"$V\"" src-tauri/tauri.conf.json > tmp && mv tmp src-tauri/tauri.conf.json
          sed -i "s/^version = .*/version = \"$V\"/" src-tauri/Cargo.toml

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ needs.prepare.outputs.version }}"
          git push
          git tag "v${{ needs.prepare.outputs.version }}"
          git push origin "v${{ needs.prepare.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: find artifacts -type f | sort

      - name: Generate latest.json for updater
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          REPO: NoWint/BonNextMinecraftLauncher-Rust
        run: |
          set -eu
          # Helper: read .sig file content (first line = signature)
          read_sig() {
            local sigfile="$1"
            if [ -f "$sigfile" ]; then
              head -1 "$sigfile"
            else
              echo ""
            fi
          }

          # Locate updater artifacts
          MACOS_TARGZ=$(find artifacts/bonnext-macos-updater -name '*.app.tar.gz' 2>/dev/null | head -1 || true)
          MACOS_SIG=$(find artifacts/bonnext-macos-updater -name '*.app.tar.gz.sig' 2>/dev/null | head -1 || true)

          # Windows: prefer .nsis.zip, fallback to -setup.exe
          WIN_ZIP=$(find artifacts/bonnext-windows-updater -name '*.nsis.zip' 2>/dev/null | head -1 || true)
          WIN_ZIP_SIG=$(find artifacts/bonnext-windows-updater -name '*.nsis.zip.sig' 2>/dev/null | head -1 || true)
          WIN_EXE=$(find artifacts/bonnext-windows-updater -name '*-setup.exe' 2>/dev/null | head -1 || true)
          WIN_EXE_SIG=$(find artifacts/bonnext-windows-updater -name '*-setup.exe.sig' 2>/dev/null | head -1 || true)

          if [ -n "$WIN_ZIP" ]; then
            WIN_FILE="$WIN_ZIP"
            WIN_SIGFILE="$WIN_ZIP_SIG"
          else
            WIN_FILE="$WIN_EXE"
            WIN_SIGFILE="$WIN_EXE_SIG"
          fi

          LINUX_TARGZ=$(find artifacts/bonnext-linux-appimage -name '*.AppImage.tar.gz' 2>/dev/null | head -1 || true)
          LINUX_SIG=$(find artifacts/bonnext-linux-appimage -name '*.AppImage.tar.gz.sig' 2>/dev/null | head -1 || true)

          # Build download URLs (GitHub Release assets)
          MACOS_URL="https://github.com/${REPO}/releases/download/v${VERSION}/$(basename "$MACOS_TARGZ" 2>/dev/null || echo '')"
          WIN_URL="https://github.com/${REPO}/releases/download/v${VERSION}/$(basename "$WIN_FILE" 2>/dev/null || echo '')"
          LINUX_URL="https://github.com/${REPO}/releases/download/v${VERSION}/$(basename "$LINUX_TARGZ" 2>/dev/null || echo '')"

          # Read signatures
          MACOS_SIGNATURE=$(read_sig "$MACOS_SIG")
          WIN_SIGNATURE=$(read_sig "$WIN_SIGFILE")
          LINUX_SIGNATURE=$(read_sig "$LINUX_SIG")

          # Current UTC timestamp in ISO 8601
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Build latest.json (Tauri v2 updater format)
          # macOS universal build covers both darwin-aarch64 and darwin-x86_64
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "BonNext v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_SIGNATURE}",
                "url": "${MACOS_URL}"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_SIGNATURE}",
                "url": "${MACOS_URL}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIGNATURE}",
                "url": "${LINUX_URL}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIGNATURE}",
                "url": "${WIN_URL}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: BonNext v${{ needs.prepare.outputs.version }}
          body: |
            ## BonNext v${{ needs.prepare.outputs.version }}

            ### Downloads
            | Platform | Package |
            |----------|---------|
            | macOS (Universal) | `.dmg` |
            | Windows | `.msi` / `.exe` |
            | Linux | `.AppImage` / `.deb` |

            ### 首次运行说明 / First-run Instructions

            由于本版本未进行代码签名，首次运行时会遇到系统安全提示：

            - **macOS**: 右键点击应用 → "打开" → 在弹窗中确认"打开"。或在"系统设置 → 隐私与安全性"中点击"仍要打开"。
            - **Windows**: SmartScreen 可能拦截，点击"更多信息" → "仍要运行"。
            - **Linux**: AppImage 需先赋予执行权限：`chmod +x BonNext*.AppImage`

            > Built with Tauri v2 + React 18 + Rust
          files: |
            artifacts/**/*
            latest.json
          generate_release_notes: true
