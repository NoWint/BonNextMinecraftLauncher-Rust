name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # =========================================================================
  # Build for macOS (Universal: Intel + Apple Silicon)
  # =========================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '9' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (macOS Universal)
        run: pnpm tauri build --target universal-apple-darwin
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # =========================================================================
  # Build for Windows
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '9' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        run: pnpm tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-windows
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # =========================================================================
  # Build for Linux (AppImage + deb)
  # =========================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '9' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Linux)
        run: pnpm tauri build

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  # =========================================================================
  # Create GitHub Release with all artifacts
  # =========================================================================
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BonNext ${{ github.ref_name }}
          body: |
            ## BonNext ${{ github.ref_name }}

            ### Downloads
            | Platform | Package |
            |----------|---------|
            | macOS (Universal) | `.dmg` |
            | Windows | `.msi` / `.exe` |
            | Linux | `.AppImage` / `.deb` |

            ### Changes
            See [CHANGELOG.md] for details.

            > Built with ❤️ using Tauri v2 + React 18 + Rust
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
