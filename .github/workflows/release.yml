name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # =========================================================================
  # Prepare: calculate next 0.0.N version number
  # =========================================================================
  prepare:
    name: Prepare
    if: "!contains(github.event.head_commit.message, 'chore: bump version to')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.NEW_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: calc
        name: Calculate next version
        run: |
          LATEST=$(git tag -l 'v0.0.[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            PATCH=1
          else
            PATCH=$(echo "$LATEST" | sed 's/v0\.0\.//')
            PATCH=$((PATCH + 1))
          fi
          echo "NEW_VERSION=0.0.$PATCH" >> $GITHUB_OUTPUT
          echo "Next version: 0.0.$PATCH"

  # =========================================================================
  # Build macOS (Universal: Intel + Apple Silicon)
  # =========================================================================
  build-macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version ${{ needs.prepare.outputs.version }}
        run: |
          V="${{ needs.prepare.outputs.version }}"
          jq ".version = \"$V\"" package.json > tmp && mv tmp package.json
          jq ".version = \"$V\"" src-tauri/tauri.conf.json > tmp && mv tmp src-tauri/tauri.conf.json
          sed -i '' "s/^version = .*/version = \"$V\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '9' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (macOS Universal)
        run: pnpm tauri build --target universal-apple-darwin

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # =========================================================================
  # Build Windows
  # =========================================================================
  build-windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version ${{ needs.prepare.outputs.version }}
        shell: powershell
        run: |
          $v = "${{ needs.prepare.outputs.version }}"
          (Get-Content package.json) -replace '"version": ".*"', """version"": ""$v""" | Set-Content package.json
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": ".*"', """version"": ""$v""" | Set-Content src-tauri/tauri.conf.json
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = ""$v""" | Set-Content src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '9' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        run: pnpm tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # =========================================================================
  # Build Linux (AppImage + deb)
  # =========================================================================
  build-linux:
    name: Build Linux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version ${{ needs.prepare.outputs.version }}
        run: |
          V="${{ needs.prepare.outputs.version }}"
          jq ".version = \"$V\"" package.json > tmp && mv tmp package.json
          jq ".version = \"$V\"" src-tauri/tauri.conf.json > tmp && mv tmp src-tauri/tauri.conf.json
          sed -i "s/^version = .*/version = \"$V\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '9' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Linux)
        run: pnpm tauri build

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonnext-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  # =========================================================================
  # Create GitHub Release with all artifacts
  # =========================================================================
  release:
    name: Create Release
    needs: [prepare, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version ${{ needs.prepare.outputs.version }}
        run: |
          V="${{ needs.prepare.outputs.version }}"
          jq ".version = \"$V\"" package.json > tmp && mv tmp package.json
          jq ".version = \"$V\"" src-tauri/tauri.conf.json > tmp && mv tmp src-tauri/tauri.conf.json
          sed -i "s/^version = .*/version = \"$V\"/" src-tauri/Cargo.toml

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ needs.prepare.outputs.version }}"
          git push
          git tag "v${{ needs.prepare.outputs.version }}"
          git push origin "v${{ needs.prepare.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: BonNext v${{ needs.prepare.outputs.version }}
          body: |
            ## BonNext v${{ needs.prepare.outputs.version }}

            ### Downloads
            | Platform | Package |
            |----------|---------|
            | macOS (Universal) | `.dmg` |
            | Windows | `.msi` / `.exe` |
            | Linux | `.AppImage` / `.deb` |

            > Built with Tauri v2 + React 18 + Rust
          files: artifacts/**/*
          generate_release_notes: true
