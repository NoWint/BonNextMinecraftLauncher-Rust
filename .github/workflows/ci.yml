name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # =========================================================================
  # Fast checks: TypeScript + Rust + Frontend build
  # =========================================================================
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: '9' }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Rust test
        if: runner.os != 'Windows'
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Frontend build
        run: pnpm build

  # =========================================================================
  # Lint: Clippy for Rust
  # =========================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml
