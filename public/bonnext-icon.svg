<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Hexagon shape -->
  <polygon points="100,30 170,65 170,135 100,170 30,135 30,65"
           fill="none" stroke="#FFE600" stroke-width="3"/>
  <!-- "B" letterform in cyberpunk style -->
  <text x="100" y="118" text-anchor="middle"
        font-family="Arial Black, sans-serif" font-weight="900"
        font-size="90" fill="#FFE600" letter-spacing="-4">B</text>
  <!-- Accent slash -->
  <line x1="70" y1="145" x2="130" y2="55"
        stroke="#FFE600" stroke-width="2" opacity="0.4"/>
  <!-- Corner accents -->
  <rect x="16" y="16" width="20" height="2" fill="#FFE600" opacity="0.3"/>
  <rect x="16" y="16" width="2" height="20" fill="#FFE600" opacity="0.3"/>
  <rect x="164" y="16" width="20" height="2" fill="#FFE600" opacity="0.3"/>
  <rect x="182" y="16" width="2" height="20" fill="#FFE600" opacity="0.3"/>
  <rect x="16" y="182" width="20" height="2" fill="#FFE600" opacity="0.3"/>
  <rect x="16" y="164" width="2" height="20" fill="#FFE600" opacity="0.3"/>
  <rect x="164" y="182" width="20" height="2" fill="#FFE600" opacity="0.3"/>
  <rect x="182" y="164" width="2" height="20" fill="#FFE600" opacity="0.3"/>
</svg>
