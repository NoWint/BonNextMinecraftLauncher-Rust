<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BonNext Wiki</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">BonNext <span>Wiki</span></h1>
        <button id="btn-new-article" class="btn btn-primary" title="新建文章">+ 新建</button>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜索文章..." />
      </div>
      <nav id="article-list"></nav>
    </aside>

    <main id="content">
      <div id="view-empty" class="view">
        <div class="empty-state">
          <div class="empty-icon">📖</div>
          <h2>欢迎使用 BonNext Wiki</h2>
          <p>选择左侧文章阅读，或点击「新建」创建第一篇文章</p>
        </div>
      </div>

      <div id="view-article" class="view hidden">
        <div class="article-header">
          <div class="article-meta">
            <span id="article-category" class="category-badge"></span>
            <span id="article-date" class="date"></span>
          </div>
          <div class="article-actions">
            <button id="btn-edit" class="btn btn-secondary">编辑</button>
            <button id="btn-delete" class="btn btn-danger">删除</button>
          </div>
        </div>
        <article id="article-body"></article>
      </div>

      <div id="view-editor" class="view hidden">
        <div class="editor-header">
          <input type="text" id="editor-title" placeholder="文章标题" />
          <input type="text" id="editor-category" placeholder="分类（可选）" />
        </div>
        <div class="editor-body">
          <textarea id="editor-content" placeholder="使用 Markdown 撰写文章内容..."></textarea>
          <div id="editor-preview" class="preview-pane"></div>
        </div>
        <div class="editor-footer">
          <button id="btn-cancel" class="btn btn-secondary">取消</button>
          <button id="btn-save" class="btn btn-primary">保存</button>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="hidden">
    <div class="modal">
      <h3 id="modal-title"></h3>
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary">取消</button>
        <button id="modal-confirm" class="btn btn-danger">确认</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
